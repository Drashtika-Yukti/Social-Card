version: '3.8'

services:
  social-forge-engine:
    build: .
    image: social-forge:v1
    ports:
      - "7860:7860"
    environment:
      - PORT=7860
      - API_KEY=set-your-secure-key-here
      - ENV=production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
